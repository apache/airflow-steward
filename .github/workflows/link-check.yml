---
name: link-check

# Lychee runs in informational mode for now: it surfaces broken
# internal links and broken external URLs, but does not block PR
# merges. The existing tree has a known set of pre-existing broken
# references (to files like `config/active-project.md` that this
# repository plans to add later) which would otherwise fail every
# PR. Once the baseline reaches zero, flip `continue-on-error` off.

on:  # yamllint disable-line rule:truthy
  pull_request:
  push:
    branches: [main]
  schedule:
    # Daily run catches link rot in external URLs even when no PR
    # touches them.
    - cron: "0 8 * * *"

permissions: {}

jobs:
  lychee:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      # Restore the lychee result cache so external URL checks reuse
      # results across runs (config sets `max_cache_age = "7d"`).
      - name: Restore lychee cache
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf  # v4.2.2
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
          restore-keys: cache-lychee-

      - name: Run lychee
        id: lychee
        # Pinned SHA must come from the ASF infrastructure-actions
        # allowlist (https://github.com/apache/infrastructure-actions/blob/main/approved_patterns.yml),
        # which the `asf-allowlist-check` workflow enforces on every
        # PR. The previous v2.6.1 pin was not on the allowlist; v2.8.0
        # (2026-02-17) is. When bumping, pick the next allowlisted SHA
        # — do not pick the latest upstream release blindly.
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411  # v2.8.0
        with:
          args: --config .lychee.toml --no-progress .
          fail: true
          token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: false

      - name: Summarise
        if: always()
        run: |
          if [ -f lychee/out.md ]; then
            echo "## Lychee link-check report" >> "$GITHUB_STEP_SUMMARY"
            cat lychee/out.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Lychee did not produce a report file." >> "$GITHUB_STEP_SUMMARY"
          fi
